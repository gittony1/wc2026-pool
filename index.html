<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Pool Picks</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #07111f;
  color: #e8edf2;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #0f3d24 0%, #0a2318 100%);
  padding: 18px 20px;
  text-align: center;
  border-bottom: 2px solid #c9a227;
}
header h1 { font-size: 20px; font-weight: 800; }
header h1 .wc { color: #c9a227; }
header p { font-size: 13px; color: #8fa8c0; margin-top: 4px; }
.container { max-width: 860px; margin: 0 auto; padding: 20px 16px 40px; }
.card { background: #0b1d2e; border: 1px solid #1a3350; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 800; color: #c9a227; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.6px; }
input[type="text"] {
  background: #091e36; border: 1px solid #1a3350; border-radius: 8px;
  color: #e8edf2; padding: 10px 14px; font-size: 14px; outline: none;
  width: 100%; transition: border 0.15s;
}
input[type="text"]:focus { border-color: #c9a227; }
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 14px; }
.alert-info { background: #091e36; border: 1px solid #1a4060; color: #7aadcc; }
.progress-sticky {
  position: sticky; top: 0; z-index: 50;
  background: #0b1d2e; border-bottom: 1px solid #1a3350;
  padding: 10px 16px; margin: -18px -18px 16px;
  display: flex; align-items: center; gap: 14px;
}
.progress-count { font-size: 26px; font-weight: 800; color: #c9a227; line-height: 1; }
.progress-label { font-size: 11px; color: #5a7a96; }
.progress-track { flex: 1; height: 6px; background: #1a3350; border-radius: 3px; }
.progress-fill { height: 100%; background: #c9a227; border-radius: 3px; transition: width 0.2s; }
.progress-remain { font-size: 13px; color: #5a7a96; white-space: nowrap; }
.progress-remain.done { color: #27a14a; font-weight: 700; }
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
.group-box { background: #091e36; border: 1px solid #1a3350; border-radius: 8px; padding: 10px; }
.group-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #5a7a96; margin-bottom: 6px; }
.team-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 16px; font-size: 12px;
  cursor: pointer; transition: all 0.15s;
  border: 1px solid #1a3350; background: #0b1d2e; color: #8fa8c0;
  user-select: none;
}
.chip:hover:not(.disabled) { border-color: #c9a227; color: #fff; }
.chip.picked { background: #0f3d24; border-color: #27a14a; color: #fff; font-weight: 600; }
.chip.disabled { opacity: 0.35; cursor: not-allowed; }
.btn-submit {
  width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 800;
  cursor: pointer; border: none; background: #c9a227; color: #07111f;
  transition: all 0.15s;
}
.btn-submit:hover:not(:disabled) { background: #dab83a; }
.btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
#submitError { color: #f07070; font-size: 13px; margin-top: 10px; text-align: center; }

/* Thank you screen */
#thankYou {
  display: none; text-align: center;
  padding: 48px 20px; max-width: 560px; margin: 0 auto;
}
#thankYou .big { font-size: 56px; margin-bottom: 12px; }
#thankYou h2 { font-size: 22px; font-weight: 800; color: #c9a227; margin-bottom: 8px; }
#thankYou .sub { color: #8fa8c0; font-size: 14px; }
.picks-summary {
  background: #0b1d2e; border: 1px solid #1a3350; border-radius: 10px;
  padding: 16px; margin-top: 20px; text-align: left;
}
.picks-summary-title { font-size: 11px; font-weight: 800; color: #c9a227; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.summary-group { font-size: 13px; padding: 5px 0; border-bottom: 1px solid #0d2236; }
.summary-group:last-child { border-bottom: none; }
.summary-group strong { color: #5a7a96; font-size: 11px; display: inline-block; width: 60px; }

@media (max-width: 520px) {
  .group-grid { grid-template-columns: 1fr 1fr; }
  header h1 { font-size: 17px; }
}
</style>
</head>
<body>

<div id="thankYou">
  <div class="big">🏆</div>
  <h2>You're in!</h2>
  <p class="sub" id="tyName"></p>
  <p class="sub" style="margin-top:4px;font-size:12px;color:#3a5a76;">Picks are locked. Good luck!</p>
  <button onclick="startOver()" style="margin-top:16px;background:none;border:1px solid #1a3350;color:#5a7a96;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;">Not you? Start over</button>
  <div class="picks-summary">
    <div class="picks-summary-title">Your picks</div>
    <div id="tyPicks"></div>
  </div>
</div>

<div id="formWrap">
  <header>
    <h1>⚽ <span class="wc">World Cup 2026</span> Pool</h1>
    <p>Pick 32 teams you think will advance from the group stage</p>
  </header>

  <div class="container">

    <div class="card">
      <div class="card-title">👤 Your Name</div>
      <input type="text" id="nameInput" placeholder="First and last name" oninput="updateSubmit()" maxlength="60" />
    </div>

    <div class="card">
      <div class="card-title">🌍 Pick Your 32 Teams</div>
      <div class="alert alert-info">
        Select <strong>32 teams</strong> you think will advance from the group stage.
        Max <strong>3 per group</strong>. Each correct pick = <strong>1 point</strong>.
      </div>

      <div class="progress-sticky">
        <div>
          <div class="progress-count" id="countNum">0</div>
          <div class="progress-label">of 32</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-remain" id="countRemain">32 left</div>
      </div>

      <div class="group-grid" id="groupGrid"></div>
    </div>

    <button class="btn-submit" id="submitBtn" disabled onclick="submitPicks()">
      Submit My Picks →
    </button>
    <div id="submitError"></div>

  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYGdtHkwbD7lZRtk6Ct1gW2qqVlpVPy99BB0Ix9qq8nYvXaV4C0yB2rzliwNrTCod7/exec';

const GROUPS = {
  A:['Mexico','South Korea','Czech Republic','South Africa'],
  B:['Canada','Switzerland','Bosnia & Herz.','Qatar'],
  C:['Brazil','Morocco','Scotland','Haiti'],
  D:['United States','Turkey','Australia','Paraguay'],
  E:['Germany','Ivory Coast','Ecuador','Curaçao'],
  F:['Netherlands','Japan','Sweden','Tunisia'],
  G:['Belgium','Iran','Egypt','New Zealand'],
  H:['Spain','Uruguay','Saudi Arabia','Cape Verde'],
  I:['France','Senegal','Norway','Iraq'],
  J:['Argentina','Austria','Algeria','Jordan'],
  K:['Portugal','Colombia','DR Congo','Uzbekistan'],
  L:['England','Croatia','Ghana','Panama']
};

const FLAGS = {
  'Mexico':'🇲🇽','South Korea':'🇰🇷','Czech Republic':'🇨🇿','South Africa':'🇿🇦',
  'Canada':'🇨🇦','Switzerland':'🇨🇭','Bosnia & Herz.':'🇧🇦','Qatar':'🇶🇦',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti':'🇭🇹',
  'United States':'🇺🇸','Turkey':'🇹🇷','Australia':'🇦🇺','Paraguay':'🇵🇾',
  'Germany':'🇩🇪','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨','Curaçao':'🇨🇼',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Iran':'🇮🇷','Egypt':'🇪🇬','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Uruguay':'🇺🇾','Saudi Arabia':'🇸🇦','Cape Verde':'🇨🇻',
  'France':'🇫🇷','Senegal':'🇸🇳','Norway':'🇳🇴','Iraq':'🇮🇶',
  'Argentina':'🇦🇷','Austria':'🇦🇹','Algeria':'🇩🇿','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','Colombia':'🇨🇴','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'
};

let picks = {};

function teamGroup(team) {
  for (const [g, teams] of Object.entries(GROUPS)) if (teams.includes(team)) return g;
}

function totalPicked() {
  return Object.values(picks).flat().length;
}

function renderGrid() {
  const grid = document.getElementById('groupGrid');
  let html = '';
  for (const [g, teams] of Object.entries(GROUPS)) {
    const gp = picks[g] || [];
    const full = gp.length >= 3;
    html += `<div class="group-box">
      <div class="group-label">Group ${g} <span style="font-weight:400;color:${full?'#c9a227':'#3a5a76'}">(${gp.length}/3)</span></div>
      <div class="team-chips">`;
    for (const t of teams) {
      const picked = gp.includes(t);
      const disabled = !picked && full;
      html += `<span class="chip${picked?' picked':''}${disabled?' disabled':''}"
        onclick="toggle('${esc(t)}')">${FLAGS[t]||''} ${t}</span>`;
    }
    html += `</div></div>`;
  }
  grid.innerHTML = html;

  const n = totalPicked();
  document.getElementById('countNum').textContent = n;
  document.getElementById('progressFill').style.width = (n / 32 * 100) + '%';
  const rem = document.getElementById('countRemain');
  rem.textContent = n >= 32 ? '✓ Done!' : (32 - n) + ' left';
  rem.className = 'progress-remain' + (n >= 32 ? ' done' : '');
  updateSubmit();
}

function toggle(team) {
  const g = teamGroup(team);
  if (!picks[g]) picks[g] = [];
  const arr = picks[g];
  const idx = arr.indexOf(team);
  if (idx >= 0) {
    arr.splice(idx, 1);
  } else {
    if (totalPicked() >= 32 || arr.length >= 3) return;
    arr.push(team);
  }
  renderGrid();
}

function updateSubmit() {
  const name = document.getElementById('nameInput').value.trim();
  document.getElementById('submitBtn').disabled = !(name && totalPicked() === 32);
}

function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

async function submitPicks() {
  const name = document.getElementById('nameInput').value.trim();
  const err = document.getElementById('submitError');
  err.textContent = '';
  if (!name || totalPicked() !== 32) return;

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Submitting…';
  btn.disabled = true;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ name, picks })
    });
    localStorage.setItem('wc2026_picks', JSON.stringify({ name, picks }));
    showThankYou(name, picks);
  } catch(e) {
    err.textContent = 'Submission failed. Check your connection and try again.';
    btn.textContent = 'Submit My Picks →';
    btn.disabled = false;
  }
}

function showThankYou(name, p) {
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('thankYou').style.display = 'block';
  document.getElementById('tyName').textContent = `Thanks, ${name}!`;
  let html = '';
  for (const [g, teams] of Object.entries(GROUPS)) {
    const chosen = (p[g] || []);
    if (chosen.length) {
      html += `<div class="summary-group"><strong>Group ${g}</strong> ${chosen.map(t=>(FLAGS[t]||'')+' '+t).join(', ')}</div>`;
    }
  }
  document.getElementById('tyPicks').innerHTML = html;
}

function startOver() {
  localStorage.removeItem('wc2026_picks');
  picks = {};
  document.getElementById('thankYou').style.display = 'none';
  document.getElementById('formWrap').style.display = '';
  document.getElementById('nameInput').value = '';
  renderGrid();
}

// Check if already submitted
const saved = localStorage.getItem('wc2026_picks');
if (saved) {
  try { const d = JSON.parse(saved); showThankYou(d.name, d.picks); }
  catch(e) { renderGrid(); }
} else {
  renderGrid();
}
</script>
</body>
</html>
